# Phase Registry — SDLC Phase Orchestration
# Defines all phases, their order, entry/exit gates, skill mapping, and artifacts.
# Each phase produces stakeholder-reviewable artifacts + a handoff package for the next phase.
#
# PHASE MODEL (delivery-standard aligned):
#   Opening (gated phases):  0 Discovery -> 1 Requirements -> 2 Design -> 3 Foundation
#   Middle  (continuous):    build — the Build loop (Intent -> Delegate -> Discern per spec);
#                            no artifact exit gate, a human declares feature-complete
#   Close   (gated phases):  7 Documentation -> 8 Deployment -> 9 Monitoring -> close (Close & Transfer)
#
# The visible gap where 4/5/6 used to be (Implementation/Quality/Testing) is intentional:
# batched checking is the failure mode the standard exists to kill. Checking happens
# per change inside the Build loop, never as a later batch phase.
#
# IDENTITY RULES (consumed by scripts/phase_model.py — the single source of truth):
#   - `id`     unique phase identifier; may be int (0,1,2,3,7,8,9) or string ("build","close").
#   - `slug`   artifact directory name under .sdlc/artifacts/<slug>/. Never derived by zero-padding.
#   - `order`  sequence position (0..N). "Next phase" = the entry with order+1. Never id+1.
#   - `terminal` true on the final phase (no next).
# Scripts MUST NOT assume ids are integers, contiguous, or that next = current+1.

version: "2.0"

phases:
  - id: 0
    slug: "00-discovery"
    order: 0
    name: discovery
    display: "Phase 0: Discovery"
    description: "Understand the problem space, quantify impact, map stakeholders, and define scope before writing any requirements."
    definition: "phases/00-discovery.md"
    skills:
      primary: ["/plan"]
      secondary: []
    entry_gate:
      conditions:
        - "Project initiated via /sdlc-setup"
    exit_gate:
      conditions:
        - artifact: "constitution.md"
          check: exists_and_complete
        - artifact: "problem-statement.md"
          check: exists_and_complete
        - artifact: "success-criteria.md"
          check: exists_and_complete
        - artifact: "constraints.md"
          check: exists_and_complete
        - artifact: "phase1-handoff.md"
          check: exists_and_complete
      approval: manual
    artifacts:
      required:
        - "constitution.md"
        - "problem-statement.md"
        - "success-criteria.md"
        - "constraints.md"
        - "phase1-handoff.md"
      optional:
        - "stakeholder-notes.md"
        - "market-research.md"
        - "document-registry.md"  # Document intake index (opt-in via profile.documentation)
        - "phase0-report.html"

  - id: 1
    slug: "01-requirements"
    order: 1
    name: requirements
    display: "Phase 1: Requirements"
    description: "Decompose the problem into functional and non-functional requirements with user stories and acceptance criteria."
    definition: "phases/01-requirements.md"
    skills:
      primary: ["/deep-project"]
      secondary: ["/plan"]
    entry_gate:
      conditions:
        - "Phase 0 exit gate passed"
        - "phase1-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "requirements.md"
          check: exists_and_complete
        - artifact: "non-functional-requirements.md"
          check: exists_and_complete
        - artifact: "epics.md"
          check: exists_and_complete
        - artifact: "phase2-handoff.md"
          check: exists_and_complete
      approval: manual
    artifacts:
      required:
        - "requirements.md"
        - "non-functional-requirements.md"
        - "epics.md"
        - "phase2-handoff.md"
      optional:
        - "glossary.md"
        - "phase1-report.html"

  - id: 2
    slug: "02-design"
    order: 2
    name: design
    display: "Phase 2: Design"
    description: "Create software architecture, API contracts, data models, and Architecture Decision Records."
    definition: "phases/02-design.md"
    skills:
      primary: ["/deep-plan"]
      secondary: ["/plan"]
    entry_gate:
      conditions:
        - "Phase 1 exit gate passed"
        - "phase2-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "design-doc.md"
          check: exists_and_complete
        - artifact: "api-contracts.md"
          check: exists_and_complete
        - artifact: "adrs/"
          check: exists_and_complete
        - artifact: "adr-registry.md"
          check: exists_and_complete
        - artifact: "phase3-handoff.md"
          check: exists_and_complete
      approval: manual
    artifacts:
      required:
        - "design-doc.md"
        - "api-contracts.md"
        - "adrs/"
        - "adr-registry.md"
        - "phase3-handoff.md"
      optional:
        - "data-model.md"
        - "sequence-diagrams.md"
        - "phase2-report.html"
        - "research-notes.md"
        - "integration-notes.md"
        - "external-reviews/"
        - "deep-plan-checkpoint.yaml"

  - id: 3
    slug: "03-foundation"
    order: 3
    name: foundation
    display: "Phase 3: Foundation"
    description: "Build the factory: install and adapt the harness, stand up the rails (CI/CD + gates) and dev infrastructure, and run a thin walking skeleton end-to-end through the full Build loop into the dev environment. The hinge where documents stop and software starts."
    definition: "phases/03-foundation.md"
    skills:
      primary: []
      secondary: ["/tdd", "/e2e"]
    entry_gate:
      conditions:
        - "Phase 2 exit gate passed"
        - "phase3-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "foundation-report.md"
          check: exists_and_complete
        - artifact: "risk-tier-map.md"
          check: exists_and_complete
        - artifact: "cadence-plan.md"
          check: exists_and_complete
        - artifact: "build-handoff.md"
          check: exists_and_complete
        - check: "Walking skeleton deployed to the dev environment through the real pipeline and verified"
        - check: "The rails are proven, not just present (Stop hook blocks, gates fire, deploy rolls back)"
        - check: "At least one HIGH-risk spec has run the full Build loop"
      approval: manual
    artifacts:
      required:
        - "foundation-report.md"
        - "risk-tier-map.md"
        - "cadence-plan.md"
        - "build-handoff.md"
      optional:
        - "harness-inventory.md"
        - "pipeline-proof.md"
        - "walking-skeleton-spec.md"
        - "phase3-report.html"

  - id: build
    slug: "build"
    order: 4
    name: build
    display: "Build Loop"
    description: "The continuous middle of the engagement. Every change runs the same three beats — Intent (decide + write a spec), Delegate (bound + build from an approved plan), Discern (prove against the spec by someone other than the author, then merge). Replaces the batch Implementation/Quality/Testing phases; there is no artifact exit gate — checking happens per change, and a human declares the backlog feature-complete to leave."
    definition: "phases/build-loop.md"
    continuous: true
    skills:
      primary: []
      secondary: ["/tdd", "/code-review", "/e2e"]
    entry_gate:
      conditions:
        - "Phase 3 (Foundation) exit gate passed"
        - "build-handoff.md reviewed"
        - "Rails proven and walking skeleton deployed"
    exit_gate:
      conditions:
        - check: "Build backlog is feature-complete (human declaration — no batch artifact gate)"
        - artifact: "phase7-handoff.md"
          check: exists_and_complete
      approval: manual
    artifacts:
      required:
        - "phase7-handoff.md"
      optional:
        - "specs/"
        - "build-summary.md"
        - "hardening-pass-notes.md"

  - id: 7
    slug: "07-documentation"
    order: 5
    name: documentation
    display: "Phase 7: Documentation"
    description: "Prove that someone who isn't the pod can understand, run, and operate the system from its documentation alone — verified by cold use, not by reading. README, API docs, and RUNBOOK current before deployment."
    definition: "phases/07-documentation.md"
    skills:
      primary: ["/update-docs"]
      secondary: []
    entry_gate:
      conditions:
        - "Build loop feature-complete"
        - "phase7-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "README.md"
          check: exists_and_complete
        - artifact: "api-docs.md"
          check: exists_and_complete
        - artifact: "RUNBOOK.md"
          check: exists_and_complete
        - artifact: "phase8-handoff.md"
          check: exists_and_complete
        - check: "README cold checkout completed by someone new to the repo, unassisted"
        - check: "RUNBOOK deploy + rollback + one failure scenario executed cold by the ops engineer"
      approval: manual
    artifacts:
      required:
        - "README.md"
        - "api-docs.md"
        - "RUNBOOK.md"
        - "phase8-handoff.md"
      optional:
        - "CHANGELOG.md"
        - "CONTRIBUTING.md"
        - "drift-catalog.md"
        - "phase7-report.html"

  - id: 8
    slug: "08-deployment"
    order: 6
    name: deployment
    display: "Phase 8: Deployment"
    description: "Promote to production through the pipeline that has existed since Foundation. Adds the rollout decision, the rehearsal, and a named human saying go. A good Phase 8 is boring — it invents nothing."
    definition: "phases/08-deployment.md"
    skills:
      primary: ["/e2e"]
      secondary: []
    entry_gate:
      conditions:
        - "Phase 7 exit gate passed"
        - "phase8-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "release-notes.md"
          check: exists_and_complete
        - artifact: "deployment-checklist.md"
          check: exists_and_complete
        - artifact: "smoke-test-results.md"
          check: exists_and_complete
        - artifact: "phase9-handoff.md"
          check: exists_and_complete
        - check: "Rollback rehearsed in test by the client's operators before production promotion"
        - check: "Recorded go/no-go with every named role asked and answered"
        - check: "Production smoke tests passing"
      approval: manual
    artifacts:
      required:
        - "release-notes.md"
        - "deployment-checklist.md"
        - "smoke-test-results.md"
        - "phase9-handoff.md"
      optional:
        - "rollback-procedure.md"
        - "go-no-go-record.md"
        - "deployment-log.md"
        - "phase8-report.html"

  - id: 9
    slug: "09-monitoring"
    order: 7
    name: monitoring
    display: "Phase 9: Monitoring"
    description: "Make production observable, make alerts real (thresholds from measured baselines), prove incident response by drill, and capture the engagement retrospective (the harvest raw material)."
    definition: "phases/09-monitoring.md"
    skills:
      primary: []
      secondary: ["/session-insights"]
    entry_gate:
      conditions:
        - "Phase 8 exit gate passed"
        - "phase9-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "monitoring-config.md"
          check: exists_and_complete
        - artifact: "alert-definitions.md"
          check: exists_and_complete
        - artifact: "incident-response.md"
          check: exists_and_complete
        - artifact: "project-retrospective.md"
          check: exists_and_complete
        - artifact: "close-handoff.md"
          check: exists_and_complete
        - check: "Every alert threshold derived from a measured baseline (or flagged modeled, with revisit date)"
        - check: "Alert drill executed: every critical alert fired and answered from the playbook"
      approval: manual
    artifacts:
      required:
        - "monitoring-config.md"
        - "alert-definitions.md"
        - "incident-response.md"
        - "project-retrospective.md"
        - "close-handoff.md"
      optional:
        - "baseline-data.md"
        - "drill-record.md"
        - "phase9-report.html"

  - id: close
    slug: "close"
    order: 8
    terminal: true
    name: close
    display: "Phase C: Close & Transfer"
    description: "Prove the client can run all of it without the pod — system, harness, loop, and judgment — by observed, unassisted use; then exit cleanly and feed the standard. The close gate: the client team ran one real spec end-to-end without us driving."
    definition: "phases/close.md"
    skills:
      primary: []
      secondary: []
    entry_gate:
      conditions:
        - "Phase 9 exit gate passed"
        - "close-handoff.md reviewed"
    exit_gate:
      conditions:
        - artifact: "final-handoff-report.md"
          check: exists_and_complete
        - artifact: "harness-audit.md"
          check: exists_and_complete
        - artifact: "close-gate-evidence.md"
          check: exists_and_complete
        - artifact: "access-revocation-checklist.md"
          check: exists_and_complete
        - check: "Close gate: client team ran one real spec end-to-end (triage->spec->delegate->grade->merge->deploy) without the pod driving, observed and unassisted"
        - check: "Pod access revoked and confirmed against the client's audit trail"
        - check: "Harvest PR opened against the delivery-standard repo"
      approval: manual
    artifacts:
      required:
        - "final-handoff-report.md"
        - "harness-audit.md"
        - "close-gate-evidence.md"
        - "access-revocation-checklist.md"
      optional:
        - "outcomes-dashboard-handover.md"
        - "harvest-pr-notes.md"
        - "close-report.html"
