# SDLC State Machine — Initial State
# This file is copied to .sdlc/state.yaml during project setup.
# It tracks the current phase, completed gates, and artifact status.

version: "1.0"
profile_id: "${PROFILE_ID}"
project_name: "${PROJECT_NAME}"
created_at: "${CREATED_AT}"

current_phase: 0
phase_name: "discovery"

