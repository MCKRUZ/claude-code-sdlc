version: "1.0"

company:
  name: "Example Corp"
  profile_id: "microsoft-enterprise"

stack:
  backend:
    language: csharp
    framework: dotnet-8
    orm: ef-core
    testing: xunit
  frontend:
    language: typescript
    framework: angular-17
    state: ngrx
    e2e: playwright
  database:
    engine: sql-server
    migrations: ef-core
  cloud:
    provider: azure
    services:
      - app-service
      - azure-sql
      - key-vault
      - app-insights
      - entra-id
    auth_pattern: DefaultAzureCredential
    secrets: azure-key-vault
    monitoring: app-insights
  ci_cd:
    platform: github-actions

quality:
  coverage_minimum: 80
  coverage_critical: 100
  max_file_lines: 800
  max_function_lines: 50
  require_tdd: true
  require_code_review: true
  require_security_review: true
  visual_verification:
    enabled: true
    baseline_comparison: manual
  session_health_check:
    enabled: true
    command: "dotnet build --no-restore --verbosity quiet"
    timeout_seconds: 120
    min_phase: build
  evaluation_criteria:
    # Phase 1: Requirements quality
    - name: "Requirement testability"
      phases: [1]
      description: "Every requirement must have a concrete acceptance criterion that can be verified by a test or demonstration. Vague criteria like 'the system should be fast' fail; 'P95 response time < 200ms' passes."
      severity: warn
    - name: "Requirement traceability"
      phases: [1]
      description: "Every requirement must have a unique ID (REQ-NNN) and trace to at least one stakeholder need from Phase 0. Orphan requirements with no stakeholder justification fail."
      severity: warn
    # Phase 2: Design quality
    - name: "ADR completeness"
      phases: [2]
      description: "Each ADR must state the problem, options considered (minimum 2), decision rationale, and consequences. Missing any of these sections is a fail."
      severity: fail
    - name: "Interface contract specificity"
      phases: [2]
      description: "API contracts must specify request/response schemas, error codes, and auth requirements. Contracts that say 'returns data' without specifying the shape fail."
      severity: warn
    # Phase 3: Planning quality
    - name: "Section plan verifiability"
      phases: [3]
      description: "Each section plan must include verification criteria that the section-evaluator can check mechanically. Vague criteria like 'works correctly' fail; 'all endpoints return 200 for valid input and 400 for invalid input' passes."
      severity: warn
    # Build loop: code quality (checked per change by the section-evaluator)
    - name: "Result pattern"
      phases: ["build"]
      description: "Error-prone operations use Result<T> instead of throwing exceptions. Evaluator checks for try/catch blocks that could use Result<T>."
      severity: warn
    - name: "Immutable state"
      phases: ["build"]
      description: "NgRx reducers return new state objects. No Array.push(), Object.assign() mutations, or direct property assignment on state."
      severity: fail
    - name: "API documentation"
      phases: ["build"]
      description: "All public API endpoints have XML doc comments on the controller action and a corresponding entry in api-contracts.md."
      severity: warn
    - name: "FluentValidation"
      phases: ["build"]
      description: "All DTOs received from external input have a corresponding FluentValidation validator class."
      severity: fail

compliance:
  frameworks:
    - soc2
  audit_trail: true
  change_approval: peer-review

# documentation:
#   intake_path: "docs/intake"
#   types: [pdf, markdown, text]
#   index_budget_tokens: 5000
#   summary_budget_tokens: 750
#   max_documents: 50

conventions:
  commit_format: "type: description"
  branch_naming: "type/ticket-description"
  immutability: true
  no_console_log: true
