# Profile Validation Schema
# All company profiles MUST conform to this schema.
# Uses RFC 2119 keywords: MUST, SHOULD, MAY.

type: object
required:
  - version
  - company
  - stack
  - quality

properties:
  version:
    type: string
    pattern: "^\\d+\\.\\d+$"
    description: "Schema version (MUST be semver major.minor)"

  company:
    type: object
    required: [name, profile_id]
    properties:
      name:
        type: string
        description: "Company or organization name"
      profile_id:
        type: string
        pattern: "^[a-z0-9-]+$"
        description: "Unique profile identifier (kebab-case)"

  stack:
    type: object
    description: "Technology stack configuration"
    properties:
      backend:
        type: object
        required: [language, framework]
        properties:
          language:
            type: string
            enum: [csharp, typescript, python, java, go, rust]
          framework:
            type: string
          orm:
            type: string
          testing:
            type: string
      frontend:
        type: object
        properties:
          language:
            type: string
          framework:
            type: string
          state:
            type: string
          e2e:
            type: string
      database:
        type: object
        properties:
          engine:
            type: string
          migrations:
            type: string
      cloud:
        type: object
        properties:
          provider:
            type: string
            enum: [azure, aws, gcp, self-hosted]
          services:
            type: array
            items:
              type: string
      ci_cd:
        type: object
        properties:
          platform:
            type: string
            enum: [github-actions, azure-devops, gitlab-ci, jenkins, circleci]

  quality:
    type: object
    required: [coverage_minimum]
    properties:
      coverage_minimum:
        type: integer
        minimum: 0
        maximum: 100
        description: "Minimum code coverage percentage (MUST be >= 0)"
      coverage_critical:
        type: integer
        minimum: 0
        maximum: 100
        description: "Coverage for critical paths (auth, payments)"
      max_file_lines:
        type: integer
        minimum: 100
        description: "Maximum lines per file"
      max_function_lines:
        type: integer
        minimum: 10
        description: "Maximum lines per function"
      require_tdd:
        type: boolean
        description: "MUST use test-driven development"
      require_code_review:
        type: boolean
        description: "MUST have code review before merge"
      require_security_review:
        type: boolean
        description: "MUST have security review for sensitive code"
      visual_verification:
        type: object
        description: "Optional visual regression testing via screenshots during Phase 6. When enabled, the e2e-runner captures screenshots at key user flows and stores them as baseline evidence. Inspired by Anthropic's long-running agent harness research."
        properties:
          enabled:
            type: boolean
            description: "Enable visual regression screenshot capture (default: false)"
          capture_points:
            type: array
            items:
              type: string
            description: "Named capture points (e.g., 'login-page', 'dashboard-loaded', 'form-submitted'). If omitted, e2e-runner captures at each P0 user story completion."
          baseline_comparison:
            type: string
            enum: [manual, pixel-diff, none]
            description: "How to compare against baseline: 'manual' (human reviews side-by-side), 'pixel-diff' (automated diff with threshold), 'none' (capture only). Default: manual"
          diff_threshold_percent:
            type: number
            minimum: 0
            maximum: 100
            description: "Pixel diff tolerance percentage (only used when baseline_comparison is 'pixel-diff'). Default: 5"
      session_health_check:
        type: object
        description: "Optional session-start health check. When enabled (Phase 4+), the session-start hook runs a smoke test before the agent begins new work. Inspired by Anthropic's long-running agent harness research."
        properties:
          enabled:
            type: boolean
            description: "Enable session-start health check (default: false)"
          command:
            type: string
            description: "Shell command to run as smoke test (e.g., 'dotnet build', 'npm run build', 'uv run pytest -x --timeout=30'). MUST exit 0 on success."
          timeout_seconds:
            type: integer
            minimum: 5
            maximum: 300
            description: "Maximum seconds to wait for the health check (default: 60)"
          min_phase:
            type: [string, integer]
            description: "Minimum phase (by id) to activate the health check. Phase ids: 0, 1, 2, 3, build, 7, 8, 9, close. Default: build."
      evaluation_criteria:
        type: array
        description: "Qualitative evaluation standards applied during gate checks and section evaluation. Criteria without a 'phases' field default to the build loop. Criteria with a 'phases' field are applied during gate checks for those specific phases."
        items:
          type: object
          required: [name, description]
          properties:
            name:
              type: string
              description: "Short name for the criterion (e.g., 'Result pattern', 'Requirement testability')"
            description:
              type: string
              description: "What the evaluator checks for and what constitutes a pass"
            severity:
              type: string
              enum: [fail, warn]
              description: "Whether violation is blocking (fail) or advisory (warn). Default: warn"
            phases:
              type: array
              items:
                type: [string, integer]
              description: "Which phases (by id) this criterion applies to. Phase ids: 0, 1, 2, 3, build, 7, 8, 9, close. If omitted, defaults to [build]. Example: [1, 2] applies to Requirements and Design."

  compliance:
    type: object
    properties:
      frameworks:
        type: array
        items:
          type: string
          enum: [soc2, hipaa, gdpr, pci-dss, iso27001, none]
        description: "Compliance frameworks to enforce"
      audit_trail:
        type: boolean
        description: "MUST maintain audit trail of changes"
      change_approval:
        type: string
        enum: [peer-review, manager-approval, change-board, none]

  documentation:
    type: object
    description: "Optional document intake configuration. When present, Phase 0 scans the intake_path for external reference documents (RFPs, API specs, vendor docs) and generates a searchable index with per-document summaries."
    properties:
      intake_path:
        type: string
        description: "Relative path from project root to the folder containing external documents. The folder MUST exist before Phase 0 runs. Example: 'docs/intake' or 'references/external'"
      types:
        type: array
        items:
          type: string
          enum: [pdf, markdown, text, docx, html]
        description: "File types to scan. Default: [pdf, markdown, text]"
      index_budget_tokens:
        type: integer
        minimum: 1000
        maximum: 20000
        description: "Maximum token budget for the session-start intake index. Default: 5000"
      summary_budget_tokens:
        type: integer
        minimum: 200
        maximum: 2000
        description: "Token budget per document summary. Default: 750"
      max_documents:
        type: integer
        minimum: 1
        maximum: 500
        description: "Maximum number of documents to process. Default: 50"

  conventions:
    type: object
    properties:
      commit_format:
        type: string
        description: "Commit message format pattern"
      branch_naming:
        type: string
        description: "Branch naming convention pattern"
      immutability:
        type: boolean
        description: "Prefer immutable data patterns"
      no_console_log:
        type: boolean
        description: "Disallow console.log in production code"
